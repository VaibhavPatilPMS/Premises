name: premises
description: "This is the template project for Premises Management Systems Pvt Ltd."

# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1 #QA/Dev
# version: 1.0.0+1 #UAT
# version: 1.0.0+1 #Prod

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  json_annotation: ^4.9.0
  json_serializable: ^6.13.0
  retrofit: 4.9.2
  dio: ^5.8.0+1
  dio_cache_interceptor: ^4.0.3
  cupertino_icons: ^1.0.8
  flutter_dotenv: ^5.2.1
  package_info_plus: ^8.3.0
  mixpanel_flutter: ^2.3.4
  uuid: ^4.5.1
  flutter_svg: ^2.0.17
  camera: ^0.11.2
  face_camera: ^0.1.4
  geolocator: ^14.0.0
  geocoding: ^4.0.0
  shared_preferences: ^2.5.2
  provider: ^6.1.2
  permission_handler: ^12.0.0+1
  just_the_tooltip: ^0.0.12
  video_player: any
  flick_video_player: ^0.9.0
  dropdown_button2: ^2.3.9
  omni_datetime_picker: 2.1.1
  get_thumbnail_video: ^0.7.3

  hive_ce: ^2.19.3
  firebase_core: ^3.12.1
  firebase_crashlytics: ^4.3.4
  firebase_messaging: ^15.2.4
  firebase_remote_config: ^5.4.2
  firebase_analytics: ^11.4.4
  firebase_performance: ^0.10.1+4

  flutter_local_notifications: ^19.0.0
  rxdart: any
  image_picker: ^1.2.1
  path: any
  path_provider: ^2.1.5
  intl: ^0.20.2

  device_info_plus: 11.5.0

  connectivity_plus: ^6.1.3
  internet_connection_checker_plus: ^2.7.1
  speech_to_text: ^7.0.0
  flutter_simple_dependency_injection: ^2.0.0
  file_picker: ^10.3.6
  http: any
  http_parser: ^4.1.2
  open_app_file: ^4.0.4
  upgrader: ^11.3.1
  url_launcher: ^6.3.1
  equatable: any
  cached_network_image: ^3.4.1
  flutter_staggered_grid_view: ^0.7.0
  fluttertoast: ^8.2.12
  photo_view: ^0.15.0
  image: any
  pinput: ^5.0.1
  smart_auth: ^3.2.0
  native_device_orientation: ^2.0.3
  badges: ^3.1.2
  flutter_image_compress: ^2.4.0
  video_compress: ^3.1.4
  glowy_borders: ^1.0.2
  collection: any
  in_app_update: ^4.2.3
  connectivity_plus_platform_interface: any
  skeletonizer: ^2.1.0+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  build_runner: ^2.4.14
  retrofit_generator: ^10.2.3
  hive_ce_generator: ^1.11.1

  flutter_lints: ^6.0.0


flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - .env.qa
    - .env.uat
    - .env.production
    - .env.development

  fonts:
    - family: Outfit
      fonts:
        - asset: assets/fonts/Outfit-Bold.ttf
          weight: 700
        - asset: assets/fonts/Outfit-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Outfit-Medium.ttf
          weight: 500
        - asset: assets/fonts/Outfit-Regular.ttf
          weight: 400
